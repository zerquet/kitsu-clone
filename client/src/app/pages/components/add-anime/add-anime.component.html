<div id="main"></div>
<h4>This is meant for admin use only. Add an anime to the database by filling out this form</h4>
<div class="kitsu-add-anime-form-wrapper">
    <form [formGroup]="addForm" (ngSubmit)="onSubmit()">
    
        <div>
            <label for="title">Title </label><br />
            <input id="title" type="text" formControlName="title"><br />
            <div *ngIf="title?.invalid && (title?.dirty || title?.touched)" class="required">
                <div *ngIf="title?.hasError('required')">
                    Title is required.
                </div>
            </div>
        </div>
    
        <div>
            <label for="description">Description </label><br />
            <textarea id="description" formControlName="description" rows="6"></textarea>
        </div>
    
        <div>
            <label for="image">Image </label><br />
            <input id="image" type="file" formControlName="image" (change)="onImagePicked($event)">
        </div>

        <div>
            <label for="status">Status </label>
            <button type="button" (click)="clearStatus()">Clear</button>
            <br />
            <select id="status" formControlName="status" multiple>
                <option value="trending this week">Trending this week</option>
                <option value="top airing anime">Top Airing Anime</option>
                <option value="top upcoming anime">Top Upcoming Anime</option>
                <option value="highest rated anime">Highest Rated Anime</option>
                <option value="most popular">Most Popular</option>
            </select>
        </div>

        <div>
            <label for="genres">Genres </label>
            <button type="button" (click)="clearGenres()">Clear</button>
            <select id="genres" formControlName="genres" multiple>
                <option value="romance">Romance</option>
                <option value="fantasy">Fantasy</option>
                <option value="drama">Drama</option>
                <option value="adventure">Adventure</option>
                <option value="sports">Sports</option>
                <option value="music">Music</option>
                <option value="supernatural">Supernatural</option>
                <option value="harem">Harem</option>
                <option value="thriller">Thriller</option>
                <option value="isekai">Isekai</option>
                <option value="military">Military</option>
                <option value="comedy">Comedy</option>
                <option value="action">Action</option>
                <option value="schoollife">School Life</option>
                <option value="sol">Slice of Life</option>
                <option value="scifi">Science Fiction</option>
                <option value="ecchi">Ecchi</option>
                <option value="historical">Historical</option>
                <option value="magic">Magic</option>
                <option value="mystery">Mystery</option>
                <option value="psycho">Psychological</option>
                <option value="horror">Horror</option>
                <option value="mecha">Mecha</option>
                <option value="superpower">Super Power</option>
                <option value="violence">Violence</option>
            </select>
        </div>
    
        <div>
            <p>Save your changes</p>
            <button type="submit" [disabled]="!addForm.valid">Submit</button>
        </div>
    
    </form>
</div>
<div [ngClass]="response == 'good' ? 'kitsu-response-g' : ''" [ngClass]="response == 'bad' ? 'kitsu-response-b' : ''">
    {{responseMsg}}
</div>
