<div id="main"></div>
<main class="kitsu-global">
    <div id="explore">
        <div>
            <h2>Explore Anime</h2>
            <div class="kitsu-search-wrap">
                <div class="kitsu-search-icon-wrap">
                    <img class="kitsu-search-icon" src="../../../../assets/img/magnifying-glass.svg" width="18" height="18">
                </div>
                <input class="kitsu-search-bar" type="text" placeholder="What are you searching for?">
            </div>
        </div>
        <div class="kitsu-explore-wrap">
            <h4>Anime</h4>
            <div class="kitsu-poster-list">
                <div *ngFor="let poster of animes$.getValue()" class="kitsu-poster-item">
                    <div class="poster-position">
                        <div class="poster-image">
                            <img src="data:image/jpeg;base64, {{poster.imageBase64}}" />
                        </div>
                        <div class="poster-overlay">
                            <a href=""></a>
                        </div>
                    </div>
                </div>
                <div class="filling-empty-space-childs"></div>
            </div>
            <div>

            </div>
        </div>
    </div>
    <div id="categories">
        <div id="rest-categories">
            <h5>CATEGORIES</h5>
            <small>
                Romance blah blah
            </small>
        </div>
    </div>
</main>
